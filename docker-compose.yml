name: sphynx

services:
  postgres:
    image: postgres:18.3-alpine
    container_name: sphynx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sphynx
    ports:
      - "5433:5432"
    volumes:
      - sphynx-app-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sphynx"]
      interval: 5s
      timeout: 5s
      retries: 10

  ngrok:
    image: ngrok/ngrok:latest
    container_name: sphynx-ngrok
    restart: unless-stopped
    command: http host.docker.internal:${PORT:-3003} --url=${NGROK_DOMAIN}
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4041:4040"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  sphynx-app-postgres-data:
